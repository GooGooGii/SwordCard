name: Build & Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

# 走 GitHub 官方 Pages API（actions/deploy-pages），不再 push 到 gh-pages branch。
# 好處：上傳走 artifact API，單檔上限 2 GB，不會撞 git 100 MB 硬限制
#       （之前 index.pck 101.52 MB 撞牆失敗的根因）。
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只跑一個 deploy；新的 push 會取消還在排隊的舊 run，但不會打斷正在 deploy 的。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Export HTML5
    runs-on: ubuntu-22.04
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Install Godot export templates
        shell: bash
        run: |
          set -euo pipefail

          TEMPLATE_VERSION="4.6.stable"
          TEMPLATE_DIR=$(find /root /github/home -path "*/godot/export_templates/$TEMPLATE_VERSION" -type d 2>/dev/null | head -1)

          if [ -z "$TEMPLATE_DIR" ]; then
            echo "::error::Godot export templates not found"
            find / -path "*godot/export_templates*" -type d 2>/dev/null || true
            exit 1
          fi

          mkdir -p "$HOME/.local/share/godot/export_templates"
          cp -R "$TEMPLATE_DIR" "$HOME/.local/share/godot/export_templates/$TEMPLATE_VERSION"
          ls -la "$HOME/.local/share/godot/export_templates/$TEMPLATE_VERSION"/web_*

      - name: Pre-import project
        run: godot --headless --import || true

      - name: Run smoke tests
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path . -s scripts/smoke_test.gd 2>&1 | tee smoke.log
          grep -q "SwordCard smoke test passed." smoke.log || { echo "::error::smoke test did not report success"; exit 1; }

      - name: Export Web build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/web
          rm -f build/web/*
          godot --headless --verbose --export-release "Web" build/web/index.html 2>&1 | tee build/web/export.log
          test -f build/web/index.html || { echo "::error::index.html not generated"; exit 1; }
          ls -lh build/web/

      - name: Add .nojekyll
        run: touch build/web/.nojekyll

      - name: Upload web artifact (downloadable)
        uses: actions/upload-artifact@v4
        with:
          name: SwordCard-web
          path: build/web/
          if-no-files-found: error
          retention-days: 30

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
