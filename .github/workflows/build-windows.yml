name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.3"
  GODOT_RELEASE: "stable"

jobs:
  build-windows:
    name: Export Windows EXE
    runs-on: ubuntu-22.04
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot export templates
        run: |
          TEMPLATE_VERSION="4.6.stable"
          TEMPLATE_DIR=$(find /root /github/home -path "*/godot/export_templates/$TEMPLATE_VERSION" -type d 2>/dev/null | head -1)
          if [ -z "$TEMPLATE_DIR" ]; then
            echo "ERROR: templates dir not found"
            find / -path "*godot/export_templates*" -type d 2>/dev/null
            exit 1
          fi
          echo "Templates at: $TEMPLATE_DIR"
          mkdir -p "$HOME/.local/share/godot/export_templates"
          cp -R "$TEMPLATE_DIR" "$HOME/.local/share/godot/export_templates/$TEMPLATE_VERSION"

      - name: Pre-import project
        run: godot --headless --import || true

      - name: Run smoke tests
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path . -s scripts/smoke_test.gd 2>&1 | tee smoke.log
          grep -q "SwordCard smoke test passed." smoke.log || { echo "::error::smoke test did not report success"; exit 1; }

      - name: Export Windows EXE (debug)
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/windows
          godot --headless --verbose --export-debug "Windows Desktop" build/windows/SwordCard.exe 2>&1 | tee export.log
          test -f build/windows/SwordCard.exe || { echo "::error::Windows EXE not generated"; exit 1; }
          ls -la build/windows/

      - name: Package output (exe + pck)
        run: |
          cd build/windows
          ls -la
          # Bundle into zip for cleaner download
          zip -j ../SwordCard-Windows.zip *.exe *.pck 2>/dev/null || zip -j ../SwordCard-Windows.zip *

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwordCard-Windows
          path: build/SwordCard-Windows.zip
          if-no-files-found: error
          retention-days: 30
