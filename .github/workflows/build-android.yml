name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Export debug APK (Docker)
    runs-on: ubuntu-22.04
    container:
      image: barichello/godot-ci:4.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate PNG launcher icons from SVG
        run: |
          apt-get update -qq
          apt-get install -y -qq librsvg2-bin imagemagick
          rsvg-convert -w 192 -h 192 icon.svg -o icon_192.png
          rsvg-convert -w 432 -h 432 icon.svg -o icon_fg_432.png
          convert -size 432x432 xc:'#2a3a5a' icon_bg_432.png

      - name: Patch export preset for Gradle build + PNG icons
        run: |
          sed -i 's|launcher_icons/main_192x192="res://icon.svg"|launcher_icons/main_192x192="res://icon_192.png"|' export_presets.cfg
          sed -i 's|launcher_icons/adaptive_foreground_432x432="res://icon.svg"|launcher_icons/adaptive_foreground_432x432="res://icon_fg_432.png"|' export_presets.cfg
          sed -i 's|launcher_icons/adaptive_background_432x432="res://icon.svg"|launcher_icons/adaptive_background_432x432="res://icon_bg_432.png"|' export_presets.cfg
          sed -i 's|gradle_build/use_gradle_build=false|gradle_build/use_gradle_build=true|' export_presets.cfg
          sed -i 's|gradle_build/min_sdk=""|gradle_build/min_sdk="24"|' export_presets.cfg
          sed -i 's|gradle_build/target_sdk=""|gradle_build/target_sdk="34"|' export_presets.cfg

      - name: Install Android build template (Docker image already has templates)
        run: |
          TEMPLATE_DIR=$(find / -path "*/godot/export_templates/4.4*" -type d 2>/dev/null | head -1)
          if [ -z "$TEMPLATE_DIR" ]; then
            echo "ERROR: templates dir not found"
            find / -name "android_source.zip" 2>/dev/null
            exit 1
          fi
          echo "Templates at: $TEMPLATE_DIR"
          mkdir -p android/build
          unzip -oq "$TEMPLATE_DIR/android_source.zip" -d android/build
          echo "4.4.stable" > android/.build_version

      - name: Detect Android SDK and JDK paths
        id: paths
        run: |
          # Look for common SDK locations in barichello image
          SDK=$(find / -maxdepth 5 -name "platform-tools" -type d 2>/dev/null | head -1 | xargs dirname || true)
          JDK=$(find / -maxdepth 5 -name "javac" -executable 2>/dev/null | head -1 | xargs dirname | xargs dirname || true)
          if [ -z "$SDK" ] || [ -z "$JDK" ]; then
            echo "ERROR: SDK=$SDK JDK=$JDK"
            ls /opt /usr/local 2>/dev/null
            exit 1
          fi
          echo "Found SDK: $SDK"
          echo "Found JDK: $JDK"
          echo "android_sdk=$SDK" >> $GITHUB_OUTPUT
          echo "java_sdk=$JDK" >> $GITHUB_OUTPUT

      - name: Generate debug keystore and configure editor settings
        env:
          ANDROID_SDK: ${{ steps.paths.outputs.android_sdk }}
          JAVA_SDK: ${{ steps.paths.outputs.java_sdk }}
        run: |
          # Generate JKS keystore
          keytool -genkey -v \
            -keystore /root/debug.keystore \
            -storetype JKS \
            -alias androiddebugkey \
            -storepass android -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          # Write editor_settings for Godot 4.4
          mkdir -p /root/.config/godot
          {
            echo '[gd_resource type="EditorSettings" format=3]'
            echo ''
            echo '[resource]'
            echo "export/android/android_sdk_path = \"$ANDROID_SDK\""
            echo "export/android/java_sdk_path = \"$JAVA_SDK\""
            echo 'export/android/debug_keystore = "/root/debug.keystore"'
            echo 'export/android/debug_keystore_user = "androiddebugkey"'
            echo 'export/android/debug_keystore_pass = "android"'
            echo 'export/android/release_keystore = "/root/debug.keystore"'
            echo 'export/android/release_keystore_user = "androiddebugkey"'
            echo 'export/android/release_keystore_pass = "android"'
            echo 'export/android/force_system_user = false'
            echo 'export/android/shutdown_adb_on_exit = true'
            echo 'export/android/one_click_deploy_clear_previous_install = false'
          } | tee /root/.config/godot/editor_settings-4.tres /root/.config/godot/editor_settings-4.4.tres > /dev/null
          # Bump target_sdk to 33 since build-tools 33.0.2 is what's available in barichello image
          sed -i 's|gradle_build/target_sdk="34"|gradle_build/target_sdk="33"|' export_presets.cfg

      - name: Pre-import
        run: godot --headless --import || true

      - name: Export Android APK (debug)
        run: |
          mkdir -p build/android
          godot --headless --verbose --export-debug "Android" build/android/SwordCard.apk 2>&1 | tee export.log
          ls -la build/android/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwordCard-debug-apk
          path: build/android/SwordCard.apk
          if-no-files-found: error
          retention-days: 30
