name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.4"
  GODOT_RELEASE: "stable"

jobs:
  build-android:
    name: Export debug APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Generate debug keystore (JKS)
        run: |
          keytool -genkey -v \
            -keystore "$HOME/debug.keystore" \
            -storetype JKS \
            -alias androiddebugkey \
            -storepass android -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Generate PNG launcher icons from SVG
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin imagemagick
          rsvg-convert -w 192 -h 192 icon.svg -o icon_192.png
          rsvg-convert -w 432 -h 432 icon.svg -o icon_fg_432.png
          convert -size 432x432 xc:'#2a3a5a' icon_bg_432.png

      - name: Patch export preset (Gradle build + PNG icons)
        run: |
          sed -i 's|launcher_icons/main_192x192="res://icon.svg"|launcher_icons/main_192x192="res://icon_192.png"|' export_presets.cfg
          sed -i 's|launcher_icons/adaptive_foreground_432x432="res://icon.svg"|launcher_icons/adaptive_foreground_432x432="res://icon_fg_432.png"|' export_presets.cfg
          sed -i 's|launcher_icons/adaptive_background_432x432="res://icon.svg"|launcher_icons/adaptive_background_432x432="res://icon_bg_432.png"|' export_presets.cfg
          sed -i 's|gradle_build/use_gradle_build=false|gradle_build/use_gradle_build=true|' export_presets.cfg
          sed -i 's|gradle_build/min_sdk=""|gradle_build/min_sdk="24"|' export_presets.cfg
          sed -i 's|gradle_build/target_sdk=""|gradle_build/target_sdk="34"|' export_presets.cfg

      - name: Export Godot project (community action)
        id: export
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}_export_templates.tpz"
          relative_project_path: ./
          archive_output: false
          use_preset_export_path: true
          export_debug: true
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.HOME }}/debug.keystore
          ANDROID_KEYSTORE_USER: androiddebugkey
          ANDROID_KEYSTORE_PASSWORD: android

      - name: Locate built APK
        run: |
          find . -name "*.apk" -type f 2>/dev/null
          ls -la build/android/ 2>/dev/null || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwordCard-debug-apk
          path: |
            build/android/*.apk
            **/*.apk
          if-no-files-found: error
          retention-days: 30
