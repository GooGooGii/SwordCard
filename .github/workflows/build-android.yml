name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Export debug APK
    runs-on: ubuntu-22.04
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail

          ANDROID_SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/lib/android-sdk}}"
          JDK="${JAVA_HOME:-/usr/lib/jvm/java-17-openjdk-amd64}"

          if [ ! -d "$ANDROID_SDK" ]; then
            ANDROID_SDK=$(find / -maxdepth 5 -name "platform-tools" -type d 2>/dev/null | head -1 | xargs dirname)
          fi

          if [ ! -f "$JDK/bin/javac" ]; then
            JDK=$(find /usr/lib/jvm /opt -maxdepth 4 -name "javac" -executable 2>/dev/null | head -1 | xargs dirname | xargs dirname)
          fi

          test -d "$ANDROID_SDK" || { echo "::error::Android SDK not found"; exit 1; }
          test -f "$JDK/bin/javac" || { echo "::error::JDK not found"; exit 1; }

          echo "ANDROID_SDK=$ANDROID_SDK" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> "$GITHUB_ENV"
          echo "JAVA_HOME=$JDK" >> "$GITHUB_ENV"
          echo "$JDK/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK/build-tools/35.0.1" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK/cmake/3.10.2.4988404/bin" >> "$GITHUB_PATH"

          mkdir -p "$ANDROID_SDK/licenses"
          {
            echo "8933bad161af4178b1185d1a37fbf41ea5269c55"
            echo "d56f5187479451eabf01fb78af6dfcb131a6481e"
            echo "24333f8a63b6825ea9c5514f83c2829b004d1fee"
          } > "$ANDROID_SDK/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_SDK/licenses/android-sdk-preview-license"

          sdkmanager --sdk_root="$ANDROID_SDK" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.1" \
            "cmake;3.10.2.4988404" \
            "ndk;28.1.13356709"

      - name: Install Godot export templates
        shell: bash
        run: |
          set -euo pipefail

          TEMPLATE_VERSION="4.6.stable"
          TEMPLATE_DIR=$(find /root /github/home -path "*/godot/export_templates/$TEMPLATE_VERSION" -type d 2>/dev/null | head -1)

          if [ -z "$TEMPLATE_DIR" ]; then
            echo "::error::Godot export templates not found"
            find / -path "*godot/export_templates*" -type d 2>/dev/null || true
            exit 1
          fi

          mkdir -p "$HOME/.local/share/godot/export_templates"
          cp -R "$TEMPLATE_DIR" "$HOME/.local/share/godot/export_templates/$TEMPLATE_VERSION"
          ls -la "$HOME/.local/share/godot/export_templates/$TEMPLATE_VERSION"/android_*

      - name: Configure Godot Android export
        shell: bash
        run: |
          set -euo pipefail

          KEYSTORE="$HOME/debug.keystore"

          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkeypair -v \
              -keystore "$KEYSTORE" \
              -storetype JKS \
              -alias androiddebugkey \
              -storepass android \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK"
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/debug_keystore = "$KEYSTORE"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

          cp "$HOME/.config/godot/editor_settings-4.tres" "$HOME/.config/godot/editor_settings-4.6.tres"

          {
            echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$KEYSTORE"
            echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey"
            echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android"
          } >> "$GITHUB_ENV"

          grep -E "gradle_build/use_gradle_build|gradle_build/min_sdk|gradle_build/target_sdk|architectures/arm64-v8a|launcher_icons|package/signed" export_presets.cfg
          grep -E "textures/vram_compression/import_etc2_astc" project.godot

      - name: Pre-import project
        run: godot --headless --import || true

      - name: Run smoke tests
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path . -s scripts/smoke_test.gd 2>&1 | tee smoke.log
          grep -q "SwordCard smoke test passed." smoke.log || { echo "::error::smoke test did not report success"; exit 1; }

      - name: Export Android APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/android
          rm -f build/android/SwordCard.apk
          godot --headless --verbose --export-debug "Android" build/android/SwordCard.apk 2>&1 | tee build/android/export.log
          test -f build/android/SwordCard.apk || { echo "::error::APK not generated"; exit 1; }

      - name: Verify APK
        shell: bash
        run: |
          set -euo pipefail
          APK="build/android/SwordCard.apk"
          ls -lh "$APK"
          sha256sum "$APK"
          apksigner verify --verbose "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwordCard-debug-apk
          path: |
            build/android/SwordCard.apk
            build/android/export.log
          if-no-files-found: error
          retention-days: 30
